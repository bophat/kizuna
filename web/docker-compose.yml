services:
  # ─────────────────────────────────────────
  # Backend: Django REST API
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myprj_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # hot-reload: code changes reflected
      - backend_media:/app/media        # persistent media files
      - ./database:/database            # map database folder
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
    networks:
      - myprj_net

  # ─────────────────────────────────────────
  # Frontend: Website (user interface)
  # http://localhost:3000
  # ─────────────────────────────────────────
  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: myprj_website
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./website/src:/app/src          # hot-reload: source changes reflected
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DISABLE_HMR=false
    depends_on:
      - backend
    networks:
      - myprj_net

  # ─────────────────────────────────────────
  # Frontend: Admin dashboard
  # http://localhost:3001
  # ─────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: myprj_admin
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./admin/src:/app/src            # hot-reload: source changes reflected
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DISABLE_HMR=false
    depends_on:
      - backend
    networks:
      - myprj_net

  # ─────────────────────────────────────────
  # Database UI (sqlite-web)
  # http://localhost:8080
  # ─────────────────────────────────────────
  database_ui:
    image: coleifer/sqlite-web
    container_name: myprj_sqlite_web
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./database:/data
    command: sqlite_web /data/db.sqlite3 -x -p 8080 -H 0.0.0.0
    networks:
      - myprj_net

volumes:
  backend_media:

networks:
  myprj_net:
    driver: bridge
